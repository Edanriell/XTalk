global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /metrics

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:9090"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:9090"]

  - job_name: "chat-service"
    static_configs:
      - targets: ["chat-service:9090"]

  - job_name: "message-service"
    static_configs:
      - targets: ["message-service:9090"]

  - job_name: "matching-service"
    static_configs:
      - targets: ["matching-service:9090"]
