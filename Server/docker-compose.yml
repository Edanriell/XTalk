version: '3.8'

services:
  # Each service gets its own database via POSTGRES_MULTIPLE_DATABASES (init script).
  # A single Postgres instance hosts isolated databases — one per service.
  postgres:
    image: postgres:16-alpine
    container_name: connect_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
      # Init script reads these to create per-service databases.
      POSTGRES_MULTIPLE_DATABASES: connect_auth,connect_users,connect_chat,connect_messages,connect_matching
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh
      - ./migrations/auth:/docker-entrypoint-initdb.d/auth
      - ./migrations/users:/docker-entrypoint-initdb.d/users
      - ./migrations/chat:/docker-entrypoint-initdb.d/chat
      - ./migrations/messages:/docker-entrypoint-initdb.d/messages
      - ./migrations/matching:/docker-entrypoint-initdb.d/matching
    networks:
      - connect_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: connect_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - connect_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: connect_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - connect_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: connect_auth_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${AUTH_DB_NAME:-connect_auth}
      - DB_SSL=disable
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=168h
      - AUTH_SERVICE_PORT=50051
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      - METRICS_PORT=9090
    # gRPC port exposed only within connect_network
    expose:
      - "50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - connect_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    container_name: connect_user_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${USER_DB_NAME:-connect_users}
      - DB_SSL=disable
      - USER_SERVICE_PORT=50052
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      - METRICS_PORT=9090
    # gRPC port exposed only within connect_network
    expose:
      - "50052"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - connect_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  chat-service:
    build:
      context: .
      dockerfile: ./chat-service/Dockerfile
    container_name: connect_chat_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${CHAT_DB_NAME:-connect_chat}
      - DB_SSL=disable
      - CHAT_SERVICE_PORT=50053
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      - METRICS_PORT=9090
    # gRPC port exposed only within connect_network
    expose:
      - "50053"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - connect_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  message-service:
    build:
      context: .
      dockerfile: ./message-service/Dockerfile
    container_name: connect_message_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${MESSAGE_DB_NAME:-connect_messages}
      - DB_SSL=disable
      - MESSAGE_SERVICE_PORT=50054
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      - CHAT_SERVICE_ADDR=chat-service:50053
      - METRICS_PORT=9090
    # gRPC port exposed only within connect_network
    expose:
      - "50054"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started
    networks:
      - connect_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  matching-service:
    build:
      context: .
      dockerfile: ./matching-service/Dockerfile
    container_name: connect_matching_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${MATCHING_DB_NAME:-connect_matching}
      - DB_SSL=disable
      - MATCHING_SERVICE_PORT=50055
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      - CHAT_SERVICE_ADDR=chat-service:50053
      - USER_SERVICE_ADDR=user-service:50052
      - METRICS_PORT=9090
    # gRPC port exposed only within connect_network
    expose:
      - "50055"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - connect_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: connect_api_gateway
    environment:
      - AUTH_SERVICE_ADDR=auth-service:50051
      - USER_SERVICE_ADDR=user-service:50052
      - CHAT_SERVICE_ADDR=chat-service:50053
      - MESSAGE_SERVICE_ADDR=message-service:50054
      - MATCHING_SERVICE_ADDR=matching-service:50055
      - API_GATEWAY_PORT=8080
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - chat-service
      - message-service
      - matching-service
    networks:
      - connect_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    container_name: connect_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - connect_network
    restart: unless-stopped

networks:
  connect_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
