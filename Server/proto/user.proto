syntax = "proto3";

package user;

option go_package = "github.com/yourusername/connect/proto/user";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string avatar_url = 4;
  string status = 5; // online, offline, away
  int64 created_at = 6;
  int64 updated_at = 7;
  int64 last_seen = 8;
  int32 age = 9;
  string gender = 10;
  string country = 11;
  string language = 12;
  repeated string interests = 13;
  string bio = 14;
  bool is_active = 15;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

message CreateUserRequest {
  string user_id = 1;
  string username = 2;
  string email = 3;
}

message CreateUserResponse {
  bool success = 1;
  string message = 2;
}

message UpdateUserRequest {
  string user_id = 1;
  string username = 2;
  string avatar_url = 3;
  string bio = 4;
  int32 age = 5;
  string gender = 6;
  string country = 7;
  string language = 8;
  repeated string interests = 9;
}

message UpdateUserResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
  string user_id = 4;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByEmailResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message UpdateStatusRequest {
  string user_id = 1;
  string status = 2;
}

message UpdateStatusResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
  string status = 4;
}
